<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Invisible Labor AR</title>
    <style>
      body {
        margin: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #fff0f5; /* Нежно-розовый фон */
        font-family: sans-serif;
      }
      .ar-button {
        padding: 16px 32px;
        font-size: 18px;
        font-weight: bold;
        background-color: #ffffff;
        color: #000000;
        border: 2px solid #000000;
        border-radius: 12px;
        cursor: pointer;
        text-decoration: none;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        transition: transform 0.2s;
        display: inline-flex;
        align-items: center;
      }
      .ar-button:active {
        transform: scale(0.95);
      }
      h1 {
        font-size: 24px;
        margin-bottom: 20px;
        color: #333;
      }
    </style>
  </head>
  <body>

    <h1>Invisible Labor</h1>

    <a id="ios-ar" class="ar-button" rel="ar" href="https://docs.google.com/uc?export=download&id=1QjQihO0B5CLoerzu2WLZN9h0TJkjvDMa">
      <img src="https://developer.apple.com/assets/elements/icons/augmented-reality/augmented-reality-64x64.png" style="width:20px; height:20px; margin-right:10px;">
      Посмотреть в AR (iOS)
    </a>

    <a id="android-ar" class="ar-button" style="display: none;" href="intent://arvr.google.com/scene-viewer/1.0?file=https://katerinabulas.github.io/Invisible_Work_AR_Thesis/model.glb&mode=ar_only#Intent;scheme=https;package=com.google.ar.core;action=android.intent.action.VIEW;end;">
      Посмотреть в AR (Android)
    </a>

    <script>
      const isAndroid = /Android/i.test(navigator.userAgent);
      const iosButton = document.getElementById('ios-ar');
      const androidButton = document.getElementById('android-ar');

      if (isAndroid) {
        iosButton.style.display = 'none';
        androidButton.style.display = 'flex';
      }
    </script>

  </body>
</html>
