<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
    </style>
  </head>
  <body>
    <a-scene mindar-image="imageTargetSrc: ./targets.mind; filterMinCF: 0.00001; filterBeta: 0.001;"
             color-space="sRGB"
             renderer="colorManagement: true;"
             vr-mode-ui="enabled: false"
             device-orientation-permission-ui="enabled: false">
             
      <a-assets>
        <a-asset-item id="laborModel" src="model.glb"></a-asset-item>
      </a-assets>
      <a-entity light="type: ambient; color: #fff0f5; intensity: 0.6;"></a-entity>

      <a-entity light="type: directional; color: #ffffff; intensity: 0.8;" position="1 4 2"></a-entity>
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-gltf-model src="#laborModel"
                      position="0 3 0"
                      rotation="0 0 0"
                      scale="0.5 0.5 0.5"
                      animation-mixer>
        </a-gltf-model>
      </a-entity>

    </a-scene>
  </body>
</html>
