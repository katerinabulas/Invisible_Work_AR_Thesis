<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
    </style>
  </head>
  <body>
    <a-scene xr-mode-ui="XRMode: ar"
             renderer="colorManagement: true; physicallyCorrectLights: true;"
             light="defaultLightsEnabled: false;">
             
      <a-assets>
        <a-asset-item id="laborModel" src="model.glb"></a-asset-item>
      </a-assets>

      <a-entity light="type: ambient; color: #fff0f5; intensity: 0.6;"></a-entity>
      <a-entity light="type: directional; color: #ffffff; intensity: 0.9;" position="1 4 2"></a-entity>

      <a-entity position="0 1.5 -2" scale="0.5 0.5 0.5">
        <a-gltf-model src="#laborModel" animation-mixer></a-gltf-model>
      </a-entity>

      <a-camera position="0 1.6 0"></a-camera>
    </a-scene>
  </body>
</html>
