<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; }
      /* Стилизуем кнопку входа в AR, чтобы она выглядела аккуратно на iOS */
      .a-enter-vr-button {
        background-color: #fff0f5 !important;
        color: #000 !important;
        border-radius: 8px !important;
        padding: 10px 20px !important;
        font-family: sans-serif;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <a-scene xr-mode-ui="XRMode: ar"
             renderer="colorManagement: true; physicallyCorrectLights: true;"
             light="defaultLightsEnabled: false;">
             
      <a-assets>
        <a-asset-item id="laborModel" src="model.glb"></a-asset-item>
      </a-assets>

      <a-entity light="type: ambient; color: #fff0f5; intensity: 0.7;"></a-entity>
      <a-entity light="type: directional; color: #ffffff; intensity: 0.9;" position="1 4 2"></a-entity>

      <a-entity position="0 1.3 -1.5" scale="0.5 0.5 0.5">
        <a-gltf-model src="#laborModel" animation-mixer></a-gltf-model>
      </a-entity>

      <a-camera position="0 1.6 0" look-controls="magicWindowTrackingEnabled: true"></a-camera>
    </a-scene>
  </body>
</html>
